        option.value = s1;
        option.textContent = s1;
        step1Select.appendChild(option);
      });

        const step2Select = document.getElementById('step2Select');
        step2Select.innerHTML = '<option value="">시/군/구 선택</option>';

        if (!this.value) {
          step2Select.disabled = true;
          return;
        }

        const subRegions = gridLocationData[this.value];
        subRegions.forEach((sub, idx) => {
          const option = document.createElement('option');
          option.value = idx;
          option.textContent = sub.name;
          step2Select.appendChild(option);
        });
        step2Select.disabled = false;
      });
    });

      const s2Value = document.getElementById('step2Select').value;

      if (!s1Value) { alert('시/도를 선택해주세요.'); return; }
      if (!s2Value) { alert('시/군/구를 선택해주세요.'); return; }

      // 기상청 API용 날짜 구조 생성 (YYYYMMDD)
      const baseDate = dateInput.replace(/-/g, '');
      const selectedInfo = gridLocationData[s1Value][s2Value];

      // 상단 뱃지에 현재 선택 좌표 노출

      badge.textContent = `선택지역: ${s1Value} ${selectedInfo.name} [nx: ${selectedInfo.nx}, ny: ${selectedInfo.ny}]`;
      badge.classList.remove('d-none');

      // 실시간 날씨 데이터 조회 연동 실행
      fetchForecastData(baseDate, selectedInfo.nx, selectedInfo.ny);
    });

    // 기상청 단기예보 OpenAPI 연동 펑션
    function fetchForecastData(date, nx, ny) {
      const serviceKey = "O65FmdzHqw%2FnrFYxJsSjY2XkjGkC254myOfTSB46n%2BQ7DNLCAfzOA%2BamHVrKj7Qgz3SXLB8WEJrlcw3Q8MmDNg%3D%3D";
      const baseTime = "0500"; // 05시 정각 발표 데이터 고정 기준
      const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${serviceKey}&pageNo=1&numOfRows=1000&dataType=JSON&base_date=${date}&base_time=${baseTime}&nx=${nx}&ny=${ny}`;

      const tableBody = document.getElementById('forecastTableBody');
      tableBody.innerHTML = `
        <tr>
            <td colspan="6" class="text-primary py-5">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                기상청 공공데이터를 조회하고 있습니다...
            </td>
        </tr>`;
      document.getElementById('pagination').innerHTML = '';

      fetch(url)
        .then(response => response.json())
        .then(res => {
          if (res.response && res.response.header.resultCode === "00") {
            const rawItems = res.response.body.items.item;
            parseAndRenderWeather(rawItems, nx, ny);
          } else {
            const errorMsg = res.response ? res.response.header.resultMsg : "응답 실패";
            renderError(`데이터 로드 실패: ${errorMsg} (발표 제한시간 유효여부 및 공공포털 Key 상태를 점검하세요.)`);
          }
        })
        .catch(err => {
          console.error(err);
          renderError("네트워크 에러 또는 CORS 제한으로 데이터를 호출할 수 없습니다.");
        });
    }

    // 개별 카테고리 데이터 항목을 시간 단위 객체 구조로 리포맷팅하는 핸들러
    function parseAndRenderWeather(items, nx, ny) {
      const timeGroupMap = {};

      items.forEach(item => {
        // 단기예보 명세 가이드에 근거: TMP(1시간 기온), REH(습도)
        if (item.category === 'TMP' || item.category === 'REH') {
          const compositeKey = `${item.fcstDate}_${item.fcstTime}`;

          if (!timeGroupMap[compositeKey]) {
            timeGroupMap[compositeKey] = {
              date: item.fcstDate,
              time: item.fcstTime,
              tmp: '-',
              reh: '-',
              nx: nx,
              ny: ny
            };
          }
          if (item.category === 'TMP') timeGroupMap[compositeKey].tmp = `${item.fcstValue} °C`;
          if (item.category === 'REH') timeGroupMap[compositeKey].reh = `${item.fcstValue} %`;
        }
      });

      // 시간 순서 오름차순 정렬 배열화
      forecastList = Object.values(timeGroupMap).sort((a, b) => {
        return (a.date + a.time).localeCompare(b.date + b.time);
      });

      if (forecastList.length === 0) {
        renderError("해당 날짜 및 기점에 매핑된 기온/습도 정보 데이터 항목이 존재하지 않습니다.");
        return;
      }

      currentPage = 1;
      renderPage(currentPage);
    }

    // 데이터 테이블의 페이징 뷰 전환 연산 처리
    function renderPage(page) {
      const tableBody = document.getElementById('forecastTableBody');
      tableBody.innerHTML = '';

      const start = (page - 1) * rowsPerPage;
      const end = start + rowsPerPage;
      const paginatedItems = forecastList.slice(start, end);

      paginatedItems.forEach(item => {
        const tr = document.createElement('tr');
        const customDate = `${item.date.substring(0, 4)}-${item.date.substring(4, 6)}-${item.date.substring(6, 8)}`;
        const customTime = `${item.time.substring(0, 2)}:00`;

        tr.innerHTML = `
            <td>${customDate}</td>
            <td><span class="badge bg-light text-dark border">${customTime}</span></td>
            <td class="text-danger fw-bold">${item.tmp}</td>
            <td class="text-primary fw-bold">${item.reh}</td>
            <td class="text-muted">${item.nx}</td>
            <td class="text-muted">${item.ny}</td>
        `;
        tableBody.appendChild(tr);
      });

      buildPaginationUI();
    }

    // 부트스트랩 하단 페이지네이션 컴포넌트 실시간 동적 생성
    function buildPaginationUI() {
      const pagContainer = document.getElementById('pagination');
      pagContainer.innerHTML = '';

      const totalPages = Math.ceil(forecastList.length / rowsPerPage);
      if (totalPages <= 1) return;

      // 이전페이지 가기 화살표
      const prevLi = document.createElement('li');
      prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
      prevLi.innerHTML = `<a class="page-link">&laquo;</a>`;
      prevLi.addEventListener('click', () => {
        if (currentPage > 1) { currentPage--; renderPage(currentPage); }
      });
      pagContainer.appendChild(prevLi);

      // 넘버링 버튼 생성 루프
      for (let i = 1; i <= totalPages; i++) {
        const li = document.createElement('li');
        li.className = `page-item ${currentPage === i ? 'active' : ''}`;
        li.innerHTML = `<a class="page-link">${i}</a>`;
        li.addEventListener('click', () => {
          currentPage = i;
          renderPage(currentPage);
        });
        pagContainer.appendChild(li);
      }

      // 다음페이지 가기 화살표
      const nextLi = document.createElement('li');
      nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
      nextLi.innerHTML = `<a class="page-link">&raquo;</a>`;
      nextLi.addEventListener('click', () => {
        if (currentPage < totalPages) { currentPage++; renderPage(currentPage); }
      });
      pagContainer.appendChild(nextLi);
    }

    // 알림 메시지 출력 헬퍼 함수
    function renderError(msg) {
      const tableBody = document.getElementById('forecastTableBody');
      tableBody.innerHTML = `<tr><td colspan="6" class="text-danger py-5 fw-bold">ℹ️ ${msg}</td></tr>`;
      document.getElementById('pagination').innerHTML = '';
    }
  </script>

</body>
